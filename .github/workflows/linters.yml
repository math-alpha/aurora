name: Linters

on:
  push:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-24.04
    name: gitleaks
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION="8.21.2"
          wget -qO- "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Run gitleaks
        run: |
          gitleaks detect --config .gitleaks.toml --source . --no-git --verbose --exit-code 1

  pre-checks:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install pytest==9.0.3 Flask==3.1.3 psycopg2-binary==2.9.12 python-dotenv==1.2.2 pyyaml==6.0.1 pydantic==2.13.3 langchain-core==1.2.31

      - name: Run architectural & unit tests
        working-directory: server
        run: |
          tests=(
            tests/architectural/test_connector_rbac.py
            tests/auth/test_enforcer.py
            tests/auth/test_oauth2_state_cache.py
            tests/auth/test_stateless_auth.py
            tests/chat/test_tool_output_cap.py
            tests/db/test_connection_pool.py
            tests/security/test_input_rail.py
            tests/security/test_terminal_exec_tool.py
            tests/utils/test_log_sanitizer.py
            tests/utils/test_payload_timestamp.py
            tests/utils/test_webhook_signature.py
          )
          if [ -f tests/architectural/test_rls_coverage.py ]; then
            tests+=(tests/architectural/test_rls_coverage.py)
          else
            echo "::warning::tests/architectural/test_rls_coverage.py not present yet; skipping."
          fi
          python -m pytest "${tests[@]}" -v

      - name: Run security tests
        working-directory: server
        run: python -m pytest tests/security/ -v
