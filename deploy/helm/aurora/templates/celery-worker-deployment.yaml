apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aurora.fullname" . }}-celery-worker
  labels:
    {{- include "aurora.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.celeryWorker.enabled }}
  replicas: {{ .Values.replicaCounts.celeryWorker }}
  {{- end }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "aurora.name" . }}-celery-worker
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if not .Values.secrets.db.existingSecret }}
        checksum/secret-db: {{ include (print $.Template.BasePath "/secret-db.yaml") . | sha256sum }}
        {{- end }}
        {{- if not .Values.secrets.backend.existingSecret }}
        checksum/secret-backend: {{ include (print $.Template.BasePath "/secret-backend.yaml") . | sha256sum }}
        {{- end }}
        {{- if not .Values.secrets.app.existingSecret }}
        checksum/secret-app: {{ include (print $.Template.BasePath "/secret-app.yaml") . | sha256sum }}
        {{- end }}
        {{- if not .Values.secrets.llm.existingSecret }}
        checksum/secret-llm: {{ include (print $.Template.BasePath "/secret-llm.yaml") . | sha256sum }}
        {{- end }}
      labels:
        app.kubernetes.io/name: {{ include "aurora.name" . }}-celery-worker
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/part-of: aurora
    spec:
      terminationGracePeriodSeconds: {{ if kindIs "invalid" .Values.celeryWorker.terminationGracePeriodSeconds }}1800{{ else }}{{ .Values.celeryWorker.terminationGracePeriodSeconds }}{{ end }}
      serviceAccountName: {{ include "aurora.fullname" . }}-celery-worker
      automountServiceAccountToken: false
      securityContext:
        {{- include "aurora.podSecurityContext" (dict "service" "celeryWorker" "global" $ "defaults" (dict "runAsUser" 1000 "runAsGroup" 1000 "fsGroup" 1000)) | nindent 8 }}
      {{- if .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.image.pullSecrets | nindent 8 }}
      {{- end }}
      {{- include "aurora.scheduling" (dict "service" "celeryWorker" "global" $) | nindent 6 }}
      containers:
        - name: celery-worker
          image: "{{ .Values.image.registry }}/aurora-server:{{ .Values.image.tag }}"
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "celery -A celery_config worker --loglevel=info --concurrency=${CELERY_CONCURRENCY:-4} --pidfile=/tmp/celery-worker.pid"]
          securityContext:
            {{- include "aurora.containerSecurityContext" (dict "service" "celeryWorker" "global" $ "defaults" (dict)) | nindent 12 }}
          envFrom:
            - configMapRef:
                name: {{ include "aurora.fullname" . }}-config
            - secretRef:
                name: {{ include "aurora.secretName.db" . }}
            - secretRef:
                name: {{ include "aurora.secretName.backend" . }}
            - secretRef:
                name: {{ include "aurora.secretName.app" . }}
            - secretRef:
                name: {{ include "aurora.secretName.llm" . }}
          volumeMounts:
            - name: terraform-workdir
              mountPath: /app/terraform_workdir
            {{- if .Values.ssl.caCertSecret }}
            - name: ssl-ca-cert
              mountPath: {{ .Values.ssl.caCertMountPath }}
              readOnly: true
            {{- end }}
          # Celery workers are self-healing and reconnect to Redis automatically.
          # Using startup probe to ensure initial startup, then let Kubernetes restart the container if the main process exits.
          startupProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "test -f /tmp/celery-worker.pid"
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 18
          resources:
            {{- toYaml .Values.resources.celeryWorker | nindent 12 }}
      volumes:
        - name: terraform-workdir
          emptyDir: {}
        {{- if .Values.ssl.caCertSecret }}
        - name: ssl-ca-cert
          secret:
            secretName: {{ .Values.ssl.caCertSecret }}
        {{- end }}
